<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trellis — Customer Engagement</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --trellis:     #1B4F72;
  --trellis-dk:  #0D2B3E;
  --trellis-lt:  #EBF5FB;
  --trellis-mid: #2E86C1;
  --gold:        #D4943A;
  --gold-lt:     #FEF5E7;
  --bg:          #F4F6F8;
  --white:       #FFFFFF;
  --text:        #1A2B3C;
  --text-2:      #4A5568;
  --text-3:      #8A9BB0;
  --border:      #DDE3EB;
  --border-2:    #C5D0DC;
  --green:       #1A7A4A;
  --green-bg:    #EAF7EF;
  --green-bd:    #A3D9B8;
  --amber:       #B7600A;
  --amber-bg:    #FEF5E7;
  --amber-bd:    #F5CBA7;
  --red:         #B03A2E;
  --red-bg:      #FDEDEC;
  --red-bd:      #F1948A;
  --blue:        #1A5276;
  --blue-bg:     #EAF2F8;
  --sans:        'IBM Plex Sans', sans-serif;
  --mono:        'IBM Plex Mono', monospace;
  --serif:       Georgia, 'Times New Roman', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased; }

/* ── HEADER ── */
.app-header { background: var(--trellis); color: white; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 58px; display: flex; align-items: center; gap: 14px; }
.header-logo { width: 36px; height: 36px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; }
.header-brand { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
.header-tagline { font-size: 11px; color: rgba(255,255,255,0.6); font-family: var(--mono); }
.header-breadcrumb { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.7); }
.breadcrumb-sep { opacity: 0.4; }
.breadcrumb-link { cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
.breadcrumb-link:hover { color: white; }
.header-csm { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: rgba(255,255,255,0.85); display: none; }
.header-csm.visible { display: block; }

/* ── SHELL ── */
.shell { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

/* ── SCREEN MANAGEMENT ── */
.screen { display: none; }
.screen.active { display: block; }

/* ══════════════════════════════════
   SCREEN 1 — ACCOUNT SELECTION
   ══════════════════════════════════ */
.screen1-header { margin-bottom: 24px; }
.screen1-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.screen1-sub { font-size: 13px; color: var(--text-2); }

.account-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }

.account-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; }
.account-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.account-card.health-green::before  { background: var(--green); }
.account-card.health-amber::before  { background: var(--amber); }
.account-card.health-red::before    { background: var(--red); }
.account-card.health-blue::before   { background: var(--blue); }
.account-card:hover { border-color: var(--trellis-mid); box-shadow: 0 6px 20px rgba(27,79,114,0.12); transform: translateY(-2px); }

.ac-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
.ac-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.ac-type { font-size: 10px; color: var(--text-3); font-family: var(--mono); text-transform: uppercase; margin-top: 2px; }

.health-badge { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.health-badge.green  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.health-badge.amber  { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
.health-badge.red    { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.health-badge.blue   { background: var(--blue-bg);  color: var(--blue);  border: 1px solid var(--border-2); }

.ac-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.ac-metric { display: flex; flex-direction: column; gap: 2px; }
.ac-metric-val { font-size: 16px; font-weight: 700; color: var(--text); }
.ac-metric-label { font-size: 10px; color: var(--text-3); font-family: var(--mono); }

.nps-display { display: inline-flex; align-items: center; gap: 5px; }
.nps-val { font-size: 16px; font-weight: 700; }
.nps-val.nps-high   { color: var(--green); }
.nps-val.nps-mid    { color: var(--amber); }
.nps-val.nps-low    { color: var(--red); }
.nps-delta { font-size: 10px; font-family: var(--mono); }
.nps-delta.up   { color: var(--green); }
.nps-delta.down { color: var(--red); }

.ac-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-3); }
.ac-quarter { background: var(--trellis-lt); color: var(--trellis); font-weight: 600; padding: 3px 8px; border-radius: 4px; font-family: var(--mono); font-size: 10px; }
.ac-ticket-warn { color: var(--red); font-weight: 600; }

/* ══════════════════════════════════
   SCREEN 2 — ACCOUNT DETAIL
   ══════════════════════════════════ */
.back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--trellis-mid); font-size: 13px; cursor: pointer; margin-bottom: 20px; font-weight: 500; }
.back-btn:hover { color: var(--trellis); }

.account-hero { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 20px; }
.hero-icon { width: 52px; height: 52px; border-radius: 10px; background: var(--trellis); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
.hero-main { flex: 1; min-width: 0; }
.hero-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.hero-meta { font-size: 12px; color: var(--text-3); display: flex; gap: 12px; flex-wrap: wrap; }
.hero-metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
.hero-metric { display: flex; flex-direction: column; gap: 3px; }
.hero-metric-val { font-size: 20px; font-weight: 700; color: var(--text); }
.hero-metric-label { font-size: 10px; color: var(--text-3); font-family: var(--mono); text-transform: uppercase; }

.section-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.section-card-title { font-size: 13px; font-weight: 700; color: var(--trellis); text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--mono); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* MILESTONE DASHBOARD */
.milestone-track-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); font-family: var(--mono); margin-bottom: 8px; }
.milestone-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.milestone-cell { border: 1px solid var(--border); border-radius: 8px; padding: 12px; position: relative; }
.milestone-cell.current { border-color: var(--trellis); background: var(--trellis-lt); }
.milestone-qtr { font-size: 10px; font-family: var(--mono); font-weight: 700; color: var(--text-3); text-transform: uppercase; margin-bottom: 4px; }
.milestone-cell.current .milestone-qtr { color: var(--trellis); }
.milestone-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.milestone-status-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; display: inline-block; }
.ms-draft         { background: var(--amber-bg); color: var(--amber); }
.ms-not-started   { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }
.ms-finalized     { background: var(--green-bg); color: var(--green); }
.ms-planned       { background: var(--blue-bg); color: var(--blue); }
.ms-rescheduled   { background: var(--amber-bg); color: var(--amber); }
.ms-completed     { background: var(--green-bg); color: var(--green); }
.ms-feedback      { background: #F3E8FF; color: #7E22CE; }
.milestone-status-row { display: flex; gap: 6px; flex-wrap: wrap; }
.current-badge { position: absolute; top: 8px; right: 8px; font-size: 9px; background: var(--trellis); color: white; padding: 2px 6px; border-radius: 10px; font-family: var(--mono); }

/* USAGE SNAPSHOT */
.usage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
.usage-stat { background: var(--bg); border-radius: 6px; padding: 12px; }
.usage-stat-val { font-size: 22px; font-weight: 700; color: var(--text); }
.usage-stat-label { font-size: 11px; color: var(--text-3); }
.usage-stat-delta { font-size: 11px; font-family: var(--mono); margin-top: 2px; }
.delta-up   { color: var(--green); }
.delta-down { color: var(--red); }
.usage-narrative { font-size: 12px; color: var(--text-2); line-height: 1.6; border-left: 3px solid var(--trellis-lt); padding-left: 12px; }

/* VERBATIMS */
.verbatim-list { display: flex; flex-direction: column; gap: 10px; }
.verbatim-item { background: var(--bg); border-radius: 6px; padding: 12px; }
.verbatim-quote { font-size: 12px; color: var(--text-2); line-height: 1.6; font-style: italic; margin-bottom: 6px; }
.verbatim-attr { display: flex; align-items: center; justify-content: space-between; }
.verbatim-name { font-size: 10px; font-weight: 600; color: var(--text); }
.verbatim-score { font-size: 11px; font-family: var(--mono); }
.vs-high { color: var(--green); }
.vs-mid  { color: var(--amber); }
.vs-low  { color: var(--red); }

/* GENERATE BUTTON AREA */
.generate-area { background: var(--trellis-lt); border: 1px solid var(--trellis-mid); border-radius: 10px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 20px; }
.generate-label { font-size: 14px; font-weight: 600; color: var(--trellis); }
.generate-sub { font-size: 12px; color: var(--trellis-mid); margin-top: 2px; }
.btn-generate { background: var(--trellis); color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: var(--sans); transition: background 0.15s; }
.btn-generate:hover { background: var(--trellis-dk); }
.btn-generate:disabled { background: var(--border-2); color: var(--text-3); cursor: not-allowed; }

/* ══════════════════════════════════
   SCREEN 3 — GENERATING
   ══════════════════════════════════ */
.gen-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 48px 32px; text-align: center; }
.gen-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--trellis); border-radius: 50%; margin: 0 auto 20px; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.gen-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.gen-step { font-size: 12px; color: var(--text-3); font-family: var(--mono); }
.gen-progress { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; max-width: 360px; margin-left: auto; margin-right: auto; }
.gen-step-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-3); }
.gen-step-row.done { color: var(--green); }
.gen-step-row.active { color: var(--trellis); font-weight: 600; }
.gen-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.gen-step-row.done   .gen-dot { background: var(--green); }
.gen-step-row.active .gen-dot { background: var(--trellis); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ══════════════════════════════════
   SCREEN 4 — REPORT VIEW
   ══════════════════════════════════ */
.report-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
.report-toolbar-left { font-size: 13px; color: var(--text-2); }
.report-toolbar-right { display: flex; gap: 10px; }
.btn-secondary { background: white; color: var(--trellis); border: 1.5px solid var(--trellis); border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
.btn-secondary:hover { background: var(--trellis-lt); }
.btn-primary { background: var(--trellis); color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: background 0.15s; }
.btn-primary:hover { background: var(--trellis-dk); }

.report-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

.report-cover { background: linear-gradient(135deg, var(--trellis-dk) 0%, var(--trellis) 60%, var(--trellis-mid) 100%); color: white; padding: 48px 48px 40px; }
.report-cover-eyebrow { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
.report-cover-client { font-size: 32px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
.report-cover-title { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 28px; }
.report-cover-meta { display: flex; gap: 28px; flex-wrap: wrap; }
.cover-meta-item { display: flex; flex-direction: column; gap: 3px; }
.cover-meta-label { font-size: 10px; font-family: var(--mono); color: rgba(255,255,255,0.5); text-transform: uppercase; }
.cover-meta-val { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); }

.report-body { padding: 0 48px; }

.report-section { padding: 36px 0; border-bottom: 1px solid var(--border); }
.report-section:last-child { border-bottom: none; }

.section-eyebrow { font-size: 10px; font-family: var(--mono); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--trellis-mid); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--trellis-lt); }
.section-heading { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 14px; letter-spacing: -0.3px; }
.section-body { font-size: 14px; color: var(--text-2); line-height: 1.8; }
.section-body p { margin-bottom: 14px; }
.section-body p:last-child { margin-bottom: 0; }
.section-body strong { color: var(--text); font-weight: 600; }

.pullquote { border-left: 4px solid var(--gold); padding: 12px 20px; margin: 18px 0; background: var(--gold-lt); border-radius: 0 6px 6px 0; }
.pullquote-text { font-family: var(--serif); font-size: 15px; color: var(--text); line-height: 1.7; font-style: italic; margin-bottom: 6px; }
.pullquote-attr { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

.talking-points { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.talking-point { display: flex; gap: 12px; align-items: flex-start; }
.tp-num { width: 24px; height: 24px; border-radius: 50%; background: var(--trellis); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.tp-text { font-size: 14px; color: var(--text-2); line-height: 1.7; }

.friction-item { background: var(--red-bg); border: 1px solid var(--red-bd); border-radius: 6px; padding: 12px 16px; margin-bottom: 10px; font-size: 13px; color: var(--text-2); line-height: 1.6; }
.friction-item:last-child { margin-bottom: 0; }

.milestone-chip { display: inline-block; background: var(--trellis-lt); color: var(--trellis); border: 1px solid var(--trellis-mid); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-family: var(--mono); font-weight: 600; margin-bottom: 16px; }

.report-footer { background: var(--bg); padding: 24px 48px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-3); }
.footer-trellis { font-family: var(--mono); font-weight: 600; color: var(--trellis-mid); }

/* ERROR */
.error-box { background: var(--red-bg); border: 1px solid var(--red-bd); border-radius: 8px; padding: 14px 16px; font-size: 13px; color: var(--red); margin-top: 14px; display: none; }
.error-box.visible { display: block; }

/* MOBILE */
@media (max-width: 768px) {
  .shell { padding: 16px 14px 60px; }
  .account-grid { grid-template-columns: 1fr; }
  .hero-metrics { grid-template-columns: repeat(3, 1fr); }
  .milestone-row { grid-template-columns: repeat(2, 1fr); }
  .usage-grid { grid-template-columns: repeat(2, 1fr); }
  .report-cover { padding: 28px 24px; }
  .report-body { padding: 0 24px; }
  .report-footer { padding: 16px 24px; flex-direction: column; gap: 6px; text-align: center; }
  .generate-area { flex-direction: column; text-align: center; }
  .cover-meta-item { min-width: calc(50% - 14px); }
}

/* ── MILESTONE CREATE BUTTON ── */
.milestone-create-btn { display: block; width: 100%; margin-top: 10px; background: var(--trellis); color: white; border: none; border-radius: 6px; padding: 8px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: background 0.15s; }
.milestone-create-btn:hover { background: var(--trellis-dk); }

/* ── REPORT SNAPSHOT PANEL ── */
.report-snapshot-panel { display: grid; grid-template-columns: 180px 1fr 1fr; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.snapshot-nps { background: var(--white); padding: 24px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.nps-gauge-svg { width: 130px; height: 100px; }
.snapshot-nps-label { font-size: 10px; color: var(--text-3); font-family: var(--mono); text-align: center; }
.snapshot-usage { background: var(--white); padding: 20px 24px; }
.snapshot-tickets { background: var(--white); padding: 20px 24px; }
.snapshot-usage-heading { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--mono); margin-bottom: 8px; }

/* PROGRESS BARS */
.prog-bar-wrap { margin-bottom: 6px; }
.prog-bar-track { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
.prog-bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
.prog-bar-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.prog-bar-val { font-size: 16px; font-weight: 700; color: var(--text); }
.bar-delta { font-size: 10px; font-family: var(--mono); }
.seats-active { font-size: 18px; font-weight: 700; color: var(--trellis); }
.seats-sep, .seats-total { font-size: 14px; color: var(--text-3); }
.seats-label { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
.snapshot-seats { margin-top: 14px; }

/* TICKET PANEL */
.ticket-panel {}
.ticket-summary-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
.ticket-summary-stat { text-align: center; }
.tss-val { font-size: 20px; font-weight: 700; color: var(--text); }
.tss-label { font-size: 9px; font-family: var(--mono); color: var(--text-3); text-transform: uppercase; }
.ticket-bars { display: flex; flex-direction: column; gap: 6px; }
.ticket-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.ticket-label { width: 100px; color: var(--text-2); flex-shrink: 0; }
.ticket-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.ticket-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.ticket-count { width: 20px; text-align: right; color: var(--text-3); font-family: var(--mono); font-size: 10px; }

/* FEATURE PILLS */
.feature-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.feature-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); font-family: var(--mono); margin-bottom: 8px; }
.feature-pills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.feature-pill { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-family: var(--mono); font-weight: 500; }
.feature-pill.adopted { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.feature-pill.not-adopted { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); text-decoration: line-through; }

.mt-item { display: flex; gap: 14px; padding-bottom: 18px; position: relative; }
.mt-item::before { content: ''; position: absolute; left: 8px; top: 18px; bottom: 0; width: 1px; background: var(--border); }
.mt-item:last-child::before { display: none; }
.mt-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; background: var(--trellis-lt); border: 2px solid var(--trellis); }
.mt-dot.mt-dot-renewal     { background: var(--green-bg); border-color: var(--green); }
.mt-dot.mt-dot-onboarding  { background: var(--blue-bg);  border-color: var(--blue); }
.mt-dot.mt-dot-recognition { background: var(--gold-lt);  border-color: var(--gold); }
.mt-dot.mt-dot-risk-event  { background: var(--red-bg);   border-color: var(--red); }
.mt-dot.mt-dot-recovery    { background: var(--green-bg); border-color: var(--green); }
.mt-dot.mt-dot-milestone   { background: var(--trellis-lt); border-color: var(--trellis); }
.mt-dot.mt-dot-co-creation { background: #F3E8FF; border-color: #7E22CE; }
.mt-dot.mt-dot-product-influence { background: var(--amber-bg); border-color: var(--amber); }
.mt-content { flex: 1; }
.mt-date { font-size: 10px; font-family: var(--mono); color: var(--text-3); }
.mt-type { font-size: 11px; font-weight: 700; color: var(--trellis); margin: 2px 0 3px; }
.mt-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }

/* FRICTION ALERTS */
.friction-alert { display: flex; align-items: flex-start; gap: 10px; background: var(--red-bg); border: 1px solid var(--red-bd); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; color: var(--text-2); line-height: 1.6; }
.friction-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.friction-alert:last-child { margin-bottom: 0; }

/* TALKING POINT CARDS */
.tp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
.tp-card { background: var(--trellis-lt); border: 1px solid rgba(46,134,193,0.25); border-radius: 8px; padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
.tp-card-num { width: 28px; height: 28px; border-radius: 50%; background: var(--trellis); color: white; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tp-card-text { font-size: 13px; color: var(--text-2); line-height: 1.65; }

/* SECTION EDIT ── */
.section-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.section-header-row > div:first-child { flex: 1; }
.section-header-row .section-eyebrow { margin-bottom: 8px; }
.section-header-row .section-heading { margin-bottom: 0; }
.section-edit-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 13px; color: var(--text-3); flex-shrink: 0; margin-top: 4px; transition: all 0.15s; }
.section-edit-btn:hover { border-color: var(--trellis); color: var(--trellis); background: var(--trellis-lt); }
.section-textarea { width: 100%; min-height: 120px; border: 1px solid var(--border-2); border-radius: 6px; padding: 12px; font-family: var(--sans); font-size: 13px; color: var(--text-2); line-height: 1.7; resize: vertical; margin-bottom: 10px; }
.section-textarea:focus { outline: none; border-color: var(--trellis); }
.edit-actions-row { display: flex; gap: 8px; }
.edit-save-btn { background: var(--trellis); color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
.edit-cancel-btn { background: white; color: var(--text-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; font-size: 12px; cursor: pointer; font-family: var(--sans); }
.edit-regen-btn { background: var(--gold-lt); color: var(--gold); border: 1px solid var(--gold); border-radius: 6px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); margin-left: auto; }
.edit-regen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* REPORT SECTION: remove old margin-bottom on heading since header-row handles it */
.report-section .section-eyebrow { margin-bottom: 0; }
.report-section .section-heading  { margin-bottom: 0; }

@media (max-width: 768px) {
  .report-snapshot-panel { grid-template-columns: 1fr; }
  .tp-grid { grid-template-columns: 1fr; }
  .ticket-summary-row { grid-template-columns: repeat(2,1fr); }
}

/* ── SERVICE SUMMARY (customer-facing ticket replacement) ── */
.service-summary { display: flex; gap: 12px; margin-bottom: 10px; }
.svc-stat { flex: 1; text-align: center; background: var(--bg); border-radius: 6px; padding: 10px 6px; }
.svc-val { font-size: 20px; font-weight: 700; color: var(--text); }
.svc-green { color: var(--green); }
.svc-label { font-size: 9px; font-family: var(--mono); color: var(--text-3); text-transform: uppercase; margin-top: 2px; }
.svc-feature-pill { background: var(--gold-lt); color: var(--gold); border: 1px solid var(--gold); border-radius: 12px; padding: 4px 10px; font-size: 11px; font-weight: 600; display: inline-block; margin-bottom: 8px; }
.svc-positive { font-size: 11px; color: var(--text-2); line-height: 1.5; font-style: italic; border-left: 3px solid var(--green); padding-left: 8px; }
</style>
</head>

function milestonePillClass(status, track) {
  const map = {
    'Not Started':       'ms-not-started',
    'Draft':             'ms-draft',
    'Finalized':         'ms-finalized',
    'Not Scheduled':     'ms-not-started',
    'Planned':           'ms-planned',
    'Rescheduled':       'ms-rescheduled',
    'Completed':         'ms-completed',
    'Feedback Received': 'ms-feedback',
  };
  return map[status] || 'ms-not-started';
}

function showScreen(n) {
  ['screen1','screen2','screen3','screen4'].forEach(s => {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById('screen' + n).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToScreen1() {
  document.getElementById('breadcrumb').style.display = 'none';
  document.getElementById('header-csm').classList.remove('visible');
  showScreen(1);
}

function goToScreen2() {
  showScreen(2);
}

// ── SCREEN 1: ACCOUNT GRID ────────────────────────────────────────
function renderAccountGrid() {
  const grid = document.getElementById('account-grid');
  const sub  = document.getElementById('screen1-sub');

  const csmName = TRELLIS_DATA.vendor.cs_team[0].name;
  sub.textContent = TRELLIS_DATA.accounts.length + ' accounts · ' + csmName;

  grid.innerHTML = TRELLIS_DATA.accounts.map(a => {
    const hc = HEALTH_COLOR[a.health] || 'blue';
    const npsClass = a.nps.score >= 60 ? 'nps-high' : a.nps.score >= 40 ? 'nps-mid' : 'nps-low';
    const npsDelta = a.nps.previous_score
      ? (a.nps.score - a.nps.previous_score > 0
          ? '<span class="nps-delta up">▲' + (a.nps.score - a.nps.previous_score) + '</span>'
          : '<span class="nps-delta down">▼' + Math.abs(a.nps.score - a.nps.previous_score) + '</span>')
      : '<span class="nps-delta" style="color:var(--text-3)">First</span>';

    const ticketWarn = a.open_tickets > 4
      ? '<span class="ac-ticket-warn">⚠ ' + a.open_tickets + ' open</span>'
      : '<span>' + a.open_tickets + ' open tickets</span>';

    const tenure = a.tenure_years < 1
      ? Math.round(a.tenure_years * 12) + ' mo'
      : a.tenure_years + ' yr' + (a.tenure_years !== 1 ? 's' : '');

    const dealVal = '₹' + (a.deal_value_inr / 100000).toFixed(1) + 'L';

    return '<div class="account-card health-' + hc + '" onclick="selectAccount(\'' + a.id + '\')">' +
      '<div class="ac-top">' +
        '<div><div class="ac-name">' + escHtml(a.name) + '</div><div class="ac-type">' + escHtml(a.type) + ' · ' + escHtml(a.hq) + '</div></div>' +
        '<div class="health-badge ' + hc + '">' + escHtml(a.health.split(' — ')[0]) + '</div>' +
      '</div>' +
      '<div class="ac-metrics">' +
        '<div class="ac-metric"><span class="ac-metric-val"><span class="nps-val ' + npsClass + '">' + a.nps.score + '</span> ' + npsDelta + '</span><span class="ac-metric-label">NPS</span></div>' +
        '<div class="ac-metric"><span class="ac-metric-val">' + escHtml(dealVal) + '</span><span class="ac-metric-label">Deal Value</span></div>' +
        '<div class="ac-metric"><span class="ac-metric-val">' + escHtml(tenure) + '</span><span class="ac-metric-label">Tenure</span></div>' +
      '</div>' +
      '<div class="ac-footer">' +
        '<span class="ac-quarter">' + a.current_milestone.quarter + ' — ' + escHtml(a.current_milestone.label) + '</span>' +
        ticketWarn +
      '</div>' +
    '</div>';
  }).join('');
}

function selectAccount(id) {
  currentAccount = TRELLIS_DATA.accounts.find(a => a.id === id);
  currentCSM = TRELLIS_DATA.vendor.cs_team.find(c => c.accounts.includes(id));
  if (!currentAccount) return;

  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('breadcrumb-account').textContent = currentAccount.name;
  const csmEl = document.getElementById('header-csm');
  csmEl.textContent = currentCSM ? currentCSM.name : '';
  csmEl.classList.add('visible');

  renderHero();
  renderMilestoneDashboard();
  renderUsageSnapshot();
  renderVerbatims();
  renderGenerateArea();

  showScreen(2);
}

  const a = currentAccount;

}

function renderMilestoneDashboard() {
  const a = currentAccount;
  const cq = a.current_milestone.quarter;
  const qIndex = MILESTONE_QUARTERS.indexOf(cq);
  const reportRow = document.getElementById('milestone-report-row');
  const visitRow  = document.getElementById('milestone-visit-row');

  reportRow.innerHTML = MILESTONE_QUARTERS.map((q, i) => {
    const isCurrent = q === cq;
    const isPast = i < qIndex;
    const rs = isCurrent ? a.current_milestone.report_status : (isPast ? 'Finalized' : 'Not Started');
    const createBtn = isCurrent ? '<button class="milestone-create-btn" onclick="startGeneration()">+ Create Draft Report</button>' : '';
    return '<div class="milestone-cell' + (isCurrent ? ' current' : '') + '">' +
      (isCurrent ? '<span class="current-badge">Current</span>' : '') +
      '<div class="milestone-qtr">' + q + ' · ' + QUARTER_LABELS[q] + '</div>' +
      '<div class="milestone-name">' + MILESTONE_NAMES[q] + '</div>' +
      '<span class="milestone-status-pill ' + milestonePillClass(rs) + '">' + escHtml(rs) + '</span>' +
      createBtn +
    '</div>';
  }).join('');

  visitRow.innerHTML = MILESTONE_QUARTERS.map((q, i) => {
    const isCurrent = q === cq;
    const isPast = i < qIndex;
    const vs = isCurrent ? a.current_milestone.visit_status : (isPast ? 'Completed' : 'Not Scheduled');
    const dateStr = isCurrent && a.current_milestone.visit_date ? ' · ' + a.current_milestone.visit_date : '';
    return '<div class="milestone-cell' + (isCurrent ? ' current' : '') + '">' +
      '<div class="milestone-qtr">' + q + ' · ' + QUARTER_LABELS[q] + '</div>' +
      '<div class="milestone-name">' + MILESTONE_NAMES[q] + '</div>' +
      '<span class="milestone-status-pill ' + milestonePillClass(vs) + '">' + escHtml(vs) + escHtml(dateStr) + '</span>' +
    '</div>';
  }).join('');
}
function renderUsageSnapshot() {
  const u = currentAccount.usage;
  const actDelta = u.activation_rate_pct - u.prev_quarter_activation_pct;
  const compDelta = u.course_completion_rate_pct - u.prev_quarter_completion_pct;

  document.getElementById('usage-grid').innerHTML =
    usageStat('Activation Rate', u.activation_rate_pct + '%', actDelta) +
    usageStat('Course Completion', u.course_completion_rate_pct + '%', compDelta) +
    usageStat('Active Users', u.active_users.toLocaleString('en-IN') + ' / ' + u.licensed_seats.toLocaleString('en-IN'), 0, 'seats') +
    usageStat('Avg Logins/User/Month', u.avg_logins_per_user_per_month, 0, '') +
    usageStat('Features Adopted', u.features_adopted.length + ' of ' + (u.features_adopted.length + u.features_not_adopted.length), 0, '') +
    usageStat('Top Module', u.top_modules[0], 0, '');

  document.getElementById('usage-narrative').textContent = u.trend_narrative;
}

function usageStat(label, val, delta, suffix) {
  const deltaHtml = (typeof delta === 'number' && delta !== 0)
    ? '<div class="usage-stat-delta ' + (delta > 0 ? 'delta-up' : 'delta-down') + '">' +
      (delta > 0 ? '▲' : '▼') + Math.abs(delta) + (suffix || '%') + ' vs last quarter</div>'
    : '';
  return '<div class="usage-stat"><div class="usage-stat-val">' + escHtml(String(val)) + '</div>' +
    '<div class="usage-stat-label">' + escHtml(label) + '</div>' + deltaHtml + '</div>';
}

}

  progressEl.innerHTML = GEN_STEPS.map((s, i) => {
    const cls = i < activeIdx ? 'done' : i === activeIdx ? 'active' : '';
    return '<div class="gen-step-row ' + cls + '"><div class="gen-dot"></div><span>' + escHtml(s) + '</span></div>';
  }).join('');
}

async function startGeneration() {
  document.getElementById('error-box').classList.remove('visible');
  showScreen(3);
  setGenStep(0);

  try {
    // PASS 1 — Narrative Planner
    setGenStep(1);
    const plan = await runNarrativePlanner();

    // PASS 2 — Section Writer
    setGenStep(3);
    const report = await runSectionWriter(plan);

    setGenStep(4);
    generatedReport = report;
    generatedReport._plan = plan;

    await new Promise(r => setTimeout(r, 600));
    renderReport(report, plan);
    showScreen(4);

  } catch (e) {
    console.error(e);
    showScreen(2);
    const eb = document.getElementById('error-box');
    eb.textContent = 'Report generation failed: ' + (e.message || 'Unknown error. Please try again.');
    eb.classList.add('visible');
  }
}

// ── CLAUDE API CALLER ────────────────────────────────────────────
async function callClaude(system, user, maxTokens) {
  const resp = await Promise.race([
    fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: maxTokens,
        system,
        messages: [{ role: 'user', content: user }]
      })
    }),
    new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out after 90 seconds')), 90000))
  ]);
  const data = await resp.json();
  if (data.error) throw new Error('API error: ' + data.error.message);
  if (!data.content || !data.content[0] || !data.content[0].text) throw new Error('Empty response from API');
  return data.content[0].text;
}

function npsColor(score) {
  return score >= 60 ? 'var(--green)' : score >= 40 ? 'var(--amber)' : 'var(--red)';
}

function npsGaugeSVG(score, prevScore) {
  const pct = Math.max(0, Math.min(100, score)) / 100;
  const r = 38, cx = 50, cy = 50;
  const circ = Math.PI * r; // semicircle length
  const filled = pct * circ;
  const color = npsColor(score);
  const delta = prevScore !== null ? (score - prevScore) : null;
  const deltaHtml = delta !== null
    ? `<text x="50" y="72" text-anchor="middle" font-size="9" fill="${delta >= 0 ? '#1A7A4A' : '#B03A2E'}" font-family="monospace">${delta >= 0 ? '▲' : '▼'}${Math.abs(delta)} vs prev</text>`
    : `<text x="50" y="72" text-anchor="middle" font-size="9" fill="#8A9BB0" font-family="monospace">First score</text>`;
  return `<svg viewBox="0 0 100 80" class="nps-gauge-svg">
    <path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="#DDE3EB" stroke-width="9" stroke-linecap="round"/>
    <path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${filled.toFixed(1)} ${circ.toFixed(1)}" transform="rotate(180 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="22" font-weight="700" fill="${color}" font-family="sans-serif">${score}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="8" fill="#8A9BB0" font-family="monospace">NPS SCORE</text>
    ${deltaHtml}
  </svg>`;
}

function progressBar(pct, color, prevPct) {
  const delta = prevPct !== undefined ? pct - prevPct : null;
  const deltaStr = delta !== null
    ? `<span class="bar-delta ${delta >= 0 ? 'delta-up' : 'delta-down'}">${delta >= 0 ? '▲' : '▼'}${Math.abs(delta)}% vs last quarter</span>`
    : '';
  return `<div class="prog-bar-wrap">
    <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="prog-bar-meta"><span class="prog-bar-val">${pct}%</span>${deltaStr}</div>
  </div>`;
}

function featurePills(adopted, notAdopted) {
  const ad = adopted.map(f => `<span class="feature-pill adopted">${escHtml(f)}</span>`).join('');
  const na = notAdopted.map(f => `<span class="feature-pill not-adopted">${escHtml(f)}</span>`).join('');
  return `<div class="feature-pills-wrap">${ad}${na}</div>`;
}


function frictionBox(text) {
  const sentences = text.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 10);
  return sentences.map(s =>
    `<div class="friction-alert"><span class="friction-icon">⚠</span><span>${escHtml(s.trim())}</span></div>`
  ).join('');
}

function toggleEdit(key) {
  const bodyEl = document.getElementById('body-' + key);
  const editEl = document.getElementById('edit-' + key);
  const isEditing = editEl.style.display !== 'none';
  if (isEditing) {
    cancelEdit(key);
  } else {
    bodyEl.style.display = 'none';
    editEl.style.display = 'block';
    const ta = document.getElementById('textarea-' + key);
    if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
  }
}

function saveEdit(key) {
  const ta = document.getElementById('textarea-' + key);
  if (!ta) return;
  const newValue = ta.value.trim();
  const bodyEl = document.getElementById('body-' + key);
  const editEl = document.getElementById('edit-' + key);

  if (key === 'discussion_points') {
    const pts = newValue.split(/\n+/).map(p => p.replace(/^\d+[.)\s]+/, '').trim()).filter(Boolean);
    generatedReport.discussion_points = pts;
    bodyEl.innerHTML = pts.map((pt, i) => tpCard(pt, i)).join('');
  } else if (key === 'our_commitment') {
    generatedReport.our_commitment = newValue;
    bodyEl.innerHTML = frictionBox(newValue);
  } else {
    generatedReport[key] = newValue;
    bodyEl.innerHTML = '<p>' + escHtml(newValue) + '</p>';
  }
  bodyEl.style.display = '';
  editEl.style.display = 'none';
}

function cancelEdit(key) {
  document.getElementById('body-' + key).style.display = '';
  document.getElementById('edit-' + key).style.display = 'none';
}

async function regenSection(key) {
  const btn = document.querySelector('#edit-' + key + ' .edit-regen-btn');
  if (btn) { btn.textContent = '↺ Regenerating...'; btn.disabled = true; }

  const sectionLabels = {
    journey_so_far: 'Our Journey Together — how this partnership began and where it has come from',
    where_you_are_today: 'Your Progress This Quarter — written for the customer, celebrating their team achievement',
    moments_that_mattered: 'Moments That Mattered — specific human highlights that show this is a real relationship',
    learned_from_you: 'How You Have Made Us Better — credit returned to the customer for their influence on Trellis',
    our_commitment: 'Our Commitment to You — honest, solution-forward. 2-3 things Trellis owns and is fixing. No blame.',
    discussion_points: "Let's Talk About — 4 shared agenda topics framed as joint conversation starters",
    looking_ahead: 'What We Are Building Together Next — forward-looking, warm, specific to signals in the data',
  };

  const systemPrompt = `You are rewriting one section of a customer-facing Engagement Report for ${currentAccount.name}. This document is addressed TO the customer — use "you" and "your team" throughout. It will be presented in a meeting and left with them.
Section to rewrite: ${sectionLabels[key] || key}
Write in a warm, direct, specific voice. 60-80 words max. No bullet points. Reference actual module names, dates, or verbatims from the account data.
${key === 'discussion_points' ? 'Return EXACTLY 4 lines. Each line is one talking point, 1-2 sentences. No numbers, no bullets, no blank lines, nothing else. Just 4 plain lines separated by newlines.' : ''}
${key === 'our_commitment' ? 'Write 2-3 solution-forward sentences. Trellis owns the issues. No blame. Each sentence names something specific being worked on.' : ''}
Return ONLY the section text, no labels, no JSON.`;

  try {
    const newText = await callClaude(systemPrompt, 'Account data:\n' + JSON.stringify(currentAccount, null, 2), 600);
    const ta = document.getElementById('textarea-' + key);
    if (ta) {
      // For discussion_points, parse the regenerated text into clean lines
      // so the textarea shows one point per line regardless of how Claude formatted them
      if (key === 'discussion_points') {
        const pts = newText.trim().split(/\n+/).map(p => p.replace(/^\d+[.)\s]+/, '').trim()).filter(Boolean);
        ta.value = pts.join('\n');
      } else {
        ta.value = newText.trim();
      }
    }
  } catch (e) {
    alert('Regeneration failed: ' + e.message);
  }

  if (btn) { btn.textContent = '↺ Regenerate'; btn.disabled = false; }
}


// ── PDF DOWNLOAD ──────────────────────────────────────────────────
function downloadReportPDF() {
  const { jsPDF } = window.jspdf;
  const a = currentAccount;
  const report = generatedReport;
  if (!report) return;

  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  const W = 210, margin = 20, cw = W - margin * 2;
  let y = margin;

  function checkY(needed) {
    if (y + needed > 285) { doc.addPage(); y = margin; }
  }

  // Cover
  doc.setFillColor(27, 79, 114);
  doc.rect(0, 0, W, 80, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(22);
  doc.text(a.name, margin, 32);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(12);
  doc.text(a.current_milestone.quarter + ' · ' + a.current_milestone.label + ' · Engagement Report', margin, 42);
  doc.setFontSize(9); doc.setTextColor(180, 210, 230);
  doc.text('Prepared by Trellis Customer Success  ·  ' + (report.report_date || ''), margin, 52);
  doc.setTextColor(0); y = 92;

  const sections = [
    { eye: 'Our Journey Together', head: 'How we got here, together', body: report.journey_so_far },
    { eye: 'Your Progress This Quarter', head: 'What your team has achieved', body: report.where_you_are_today },
    { eye: 'Moments That Mattered', head: 'Highlights of our relationship', body: report.moments_that_mattered },
    { eye: 'How You Have Made Us Better', head: 'A credit that belongs to you', body: report.learned_from_you },
    { eye: 'Our Commitment to You', head: 'What we are actively working on', body: report.our_commitment },
    { eye: 'Looking Ahead Together', head: 'What we are building together next', body: report.looking_ahead },
  ];

  // ── VISUAL METRICS PANEL ──────────────────────────────────
  // Draws a 3-column stats panel + NPS score + feature adoption
  // to match the visual snapshot shown in the web view
  const u = a.usage;
  const npsColor = a.nps.score >= 60 ? [26,122,74] : a.nps.score >= 40 ? [183,96,10] : [176,58,46];
  const actColor  = u.activation_rate_pct >= 70  ? [26,122,74] : u.activation_rate_pct >= 50  ? [183,96,10] : [176,58,46];
  const compColor = u.course_completion_rate_pct >= 70 ? [26,122,74] : u.course_completion_rate_pct >= 50 ? [183,96,10] : [176,58,46];

  checkY(72);
  // Panel background
  doc.setFillColor(244,246,248);
  doc.roundedRect(margin, y, contentWidth, 64, 2, 2, 'F');

  // NPS block (left)
  doc.setFont('helvetica', 'bold'); doc.setFontSize(28);
  doc.setTextColor(...npsColor);
  doc.text(String(a.nps.score), margin + 16, y + 22, { align: 'center' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(138,155,176);
  doc.text('NPS SCORE', margin + 16, y + 29, { align: 'center' });
  if (a.nps.previous_score) {
    const delta = a.nps.score - a.nps.previous_score;
    doc.setTextColor(delta >= 0 ? 26 : 176, delta >= 0 ? 122 : 58, delta >= 0 ? 74 : 46);
    doc.text((delta >= 0 ? '+' : '') + delta + ' vs prev', margin + 16, y + 36, { align: 'center' });
  }
  doc.text(a.nps.respondents + ' respondents', margin + 16, y + 43, { align: 'center' });

  // Divider
  doc.setDrawColor(213,222,231); doc.setLineWidth(0.3);
  doc.line(margin + 34, y + 8, margin + 34, y + 56);

  // Activation rate block
  const colW = (contentWidth - 38) / 3;
  const col1x = margin + 38;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(...actColor);
  doc.text(u.activation_rate_pct + '%', col1x + colW/2, y + 22, { align: 'center' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(138,155,176);
  doc.text('ACTIVATION RATE', col1x + colW/2, y + 29, { align: 'center' });
  const actDelta = u.activation_rate_pct - u.prev_quarter_activation_pct;
  doc.setTextColor(actDelta >= 0 ? 26 : 176, actDelta >= 0 ? 122 : 58, actDelta >= 0 ? 74 : 46);
  doc.text((actDelta >= 0 ? '▲' : '▼') + Math.abs(actDelta) + '% vs last quarter', col1x + colW/2, y + 36, { align: 'center' });
  // Progress bar
  doc.setFillColor(220,228,236); doc.roundedRect(col1x + 4, y + 42, colW - 8, 4, 1, 1, 'F');
  doc.setFillColor(...actColor); doc.roundedRect(col1x + 4, y + 42, (colW - 8) * u.activation_rate_pct / 100, 4, 1, 1, 'F');

  // Completion rate block
  const col2x = col1x + colW;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(...compColor);
  doc.text(u.course_completion_rate_pct + '%', col2x + colW/2, y + 22, { align: 'center' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(138,155,176);
  doc.text('COMPLETION RATE', col2x + colW/2, y + 29, { align: 'center' });
  const compDelta = u.course_completion_rate_pct - u.prev_quarter_completion_pct;
  doc.setTextColor(compDelta >= 0 ? 26 : 176, compDelta >= 0 ? 122 : 58, compDelta >= 0 ? 74 : 46);
  doc.text((compDelta >= 0 ? '▲' : '▼') + Math.abs(compDelta) + '% vs last quarter', col2x + colW/2, y + 36, { align: 'center' });
  doc.setFillColor(220,228,236); doc.roundedRect(col2x + 4, y + 42, colW - 8, 4, 1, 1, 'F');
  doc.setFillColor(...compColor); doc.roundedRect(col2x + 4, y + 42, (colW - 8) * u.course_completion_rate_pct / 100, 4, 1, 1, 'F');

  // Active seats block
  const col3x = col2x + colW;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(27,79,114);
  doc.text(u.active_users.toLocaleString('en-IN'), col3x + colW/2, y + 19, { align: 'center' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(138,155,176);
  doc.text('of ' + u.licensed_seats.toLocaleString('en-IN'), col3x + colW/2, y + 26, { align: 'center' });
  doc.text('ACTIVE SEATS', col3x + colW/2, y + 33, { align: 'center' });

  y += 70;

  // Feature adoption row
  checkY(24);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(138,155,176);
  doc.text('FEATURE ADOPTION', margin, y); y += 6;
  let fx = margin;
  u.features_adopted.forEach(f => {
    const tw = doc.getTextWidth(f) + 8;
    if (fx + tw > W - margin) { fx = margin; y += 8; }
    doc.setFillColor(234,240,251); doc.roundedRect(fx, y - 4, tw, 6, 1, 1, 'F');
    doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(27,79,114);
    doc.text(f, fx + 4, y); fx += tw + 4;
  });
  u.features_not_adopted.forEach(f => {
    const tw = doc.getTextWidth(f) + 8;
    if (fx + tw > W - margin) { fx = margin; y += 8; }
    doc.setFillColor(244,246,248); doc.roundedRect(fx, y - 4, tw, 6, 1, 1, 'F');
    doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(138,155,176);
    doc.text(f, fx + 4, y); fx += tw + 4;
  });
  y += 14;

  doc.setDrawColor(220); doc.setLineWidth(0.2);
  doc.line(margin, y, W - margin, y); y += 8;

  // ── SECTIONS LOOP ──────────────────────────────────────────
  sections.forEach(s => {
    checkY(40);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(46, 134, 193);
    doc.text(s.eye.toUpperCase(), margin, y); y += 6;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(26, 43, 60);
    const headLines = doc.splitTextToSize(s.head, cw);
    doc.text(headLines, margin, y); y += headLines.length * 6 + 4;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(74, 85, 104);
    const bodyLines = doc.splitTextToSize(s.body || '', cw);
    bodyLines.forEach(line => {
      checkY(7);
      doc.text(line, margin, y); y += 6;
    });
    y += 6;
    doc.setDrawColor(220); doc.setLineWidth(0.2);
    doc.line(margin, y, W - margin, y); y += 8;
  });

  // Talking points
  checkY(30);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(46, 134, 193);
  doc.text("LET'S TALK ABOUT", margin, y); y += 6;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(26, 43, 60);
  doc.text('Our shared agenda for today', margin, y); y += 8;
  (report.discussion_points || []).forEach((pt, i) => {
    checkY(14);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(27, 79, 114);
    doc.text((i + 1) + '.', margin, y);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(74, 85, 104);
    const ptLines = doc.splitTextToSize(pt, cw - 8);
    ptLines.forEach(line => { checkY(7); doc.text(line, margin + 8, y); y += 6; });
    y += 3;
  });

  // Footer on every page
  const pageCount = doc.internal.getNumberOfPages();
  for (let p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(150);
    doc.text('Trellis · Learning that sticks. Relationships that last.', margin, 290);
    doc.text('Page ' + p + ' of ' + pageCount, W - margin, 290, { align: 'right' });
  }

  const fname = a.name.replace(/[^a-z0-9]/gi, '_') + '_Engagement_Report_' + a.current_milestone.quarter + '.pdf';
  doc.save(fname);
}

// ── UTILS ─────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
